<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>GameMomentsLive — Live Scoreboard</title>
  <link rel="stylesheet" href="/shared.css">
  <style>
    /* ── Scoreboard-specific layout ── */

    html, body {
      height: 100%;
    }

    #screen-scoreboard {
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* ── SSE Status ── */

    .sse-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px 3px;
      background: rgba(0, 0, 0, 0.3);
      border-top: 1px solid var(--border);
    }

    .sse-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .sse-dot.connected    { background: var(--success); box-shadow: 0 0 5px var(--success); }
    .sse-dot.disconnected { background: var(--opp);     box-shadow: 0 0 5px var(--opp); animation: blink 1.2s step-start infinite; }
    .sse-dot.connecting   { background: var(--warn);    animation: blink 0.8s step-start infinite; }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .sse-label {
      font-family: var(--font-pixel);
      font-size: 6px;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    .sse-label.connected    { color: var(--success); }
    .sse-label.disconnected { color: var(--opp); }

    /* ── Scoreboard body ── */

    .sb-body {
      padding: 16px 14px calc(16px + var(--safe-bottom));
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Tallies panel ── */

    .tallies-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 5px;
      overflow: hidden;
    }

    .tallies-title {
      font-family: var(--font-pixel);
      font-size: 6px;
      color: var(--text-muted);
      letter-spacing: 1px;
      padding: 8px 12px 6px;
      border-bottom: 1px solid var(--border);
    }

    .tally-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 7px 12px;
      border-bottom: 1px solid rgba(42, 42, 80, 0.5);
    }

    .tally-row:last-child {
      border-bottom: none;
    }

    .tally-pfc {
      font-family: var(--font-vt);
      font-size: 22px;
      color: var(--pfc);
      text-align: right;
      text-shadow: 0 0 6px rgba(0, 229, 255, 0.4);
    }

    .tally-opp {
      font-family: var(--font-vt);
      font-size: 22px;
      color: var(--opp);
      text-align: left;
      text-shadow: 0 0 6px rgba(255, 59, 59, 0.4);
    }

    .tally-name {
      font-family: var(--font-pixel);
      font-size: 6px;
      color: var(--text-dim);
      letter-spacing: 0.5px;
      text-align: center;
      padding: 0 8px;
    }

    /* Tally accent colours */
    .tally-row.ev-goal      .tally-pfc,
    .tally-row.ev-goal      .tally-opp      { color: var(--goal-gold);  text-shadow: 0 0 8px rgba(255,215,0,0.5); }
    .tally-row.ev-goal_kick .tally-pfc,
    .tally-row.ev-goal_kick .tally-opp      { color: var(--tally-gk); }
    .tally-row.ev-corner    .tally-pfc,
    .tally-row.ev-corner    .tally-opp      { color: var(--tally-ck); }
    .tally-row.ev-free_kick .tally-pfc,
    .tally-row.ev-free_kick .tally-opp      { color: var(--tally-fk); }

    /* ── Recent events panel ── */

    .recent-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 5px;
      overflow: hidden;
    }

    .recent-panel-title {
      font-family: var(--font-pixel);
      font-size: 6px;
      color: var(--text-muted);
      letter-spacing: 1px;
      padding: 8px 12px 6px;
      border-bottom: 1px solid var(--border);
    }

    .recent-panel-events {
      padding: 6px 10px;
    }

    .sb-recent-event {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 6px;
      border-radius: 3px;
      margin-bottom: 3px;
      font-family: var(--font-vt);
      font-size: 18px;
    }

    .sb-recent-event:last-child {
      margin-bottom: 0;
    }

    .sb-re-period {
      font-family: var(--font-pixel);
      font-size: 6px;
      opacity: 0.7;
      min-width: 20px;
    }

    .sb-re-time {
      opacity: 0.8;
      min-width: 42px;
    }

    .sb-re-label { flex: 1; }

    .sb-re-pfc  { background: var(--pfc-bg);  color: var(--pfc);       }
    .sb-re-opp  { background: var(--opp-bg);  color: var(--opp);       }
    .sb-re-goal { background: var(--goal-bg); color: var(--goal-gold); font-size: 20px; }

    .sb-empty {
      font-family: var(--font-vt);
      font-size: 18px;
      color: var(--text-muted);
      text-align: center;
      padding: 14px 0;
    }

    /* ── Pre-game / waiting state ── */

    .pre-game-notice {
      background: rgba(0, 229, 255, 0.04);
      border: 1px solid rgba(0, 229, 255, 0.2);
      border-radius: 5px;
      padding: 20px;
      text-align: center;
    }

    .pre-game-notice p {
      font-family: var(--font-vt);
      font-size: 20px;
      color: var(--text-dim);
    }

    .pre-game-notice .notice-title {
      font-family: var(--font-pixel);
      font-size: 8px;
      color: var(--pfc);
      letter-spacing: 1px;
      margin-bottom: 10px;
      text-shadow: 0 0 8px rgba(0, 229, 255, 0.4);
    }

    /* ── Final state ── */

    .ft-notice {
      background: rgba(255, 215, 0, 0.05);
      border: 1px solid rgba(255, 215, 0, 0.3);
      border-radius: 5px;
      padding: 12px;
      text-align: center;
      font-family: var(--font-pixel);
      font-size: 7px;
      color: var(--goal-gold);
      letter-spacing: 2px;
      text-shadow: 0 0 8px rgba(255, 215, 0, 0.5);
    }

    /* ── Score highlight on goal ── */
    @keyframes score-pop {
      0%   { transform: scale(1);    }
      25%  { transform: scale(1.25); }
      100% { transform: scale(1);    }
    }

    .score-pop {
      animation: score-pop 0.4s ease-out;
    }
  </style>
</head>
<body>

  <!-- Loading screen -->
  <div id="screen-loading" class="center-screen">
    <div class="spinner"></div>
    <p style="font-family:var(--font-pixel);font-size:7px;color:var(--text-dim);letter-spacing:1px;">LOADING SCOREBOARD...</p>
  </div>

  <!-- Error screen -->
  <div id="screen-error" class="hidden center-screen">
    <h1 class="error-title" id="error-title">ERROR</h1>
    <p id="error-msg">Something went wrong.</p>
  </div>

  <!-- Scoreboard screen -->
  <div id="screen-scoreboard" class="screen hidden" style="display:none;">

    <!-- ── Header: Half + Clock + Opponent ── -->
    <div class="log-header">
      <div class="hud-row-top">
        <div class="half-badge" id="half-indicator">PRE</div>
        <div class="clock-display" id="clock">00:00</div>
        <div class="log-opp" id="header-opponent">vs —</div>
      </div>
      <div class="hud-score-row">
        <span class="hud-team-label hud-pfc" id="score-pfc-name">PFC</span>
        <span class="hud-score" id="score-pfc">0</span>
        <span class="hud-divider">—</span>
        <span class="hud-score" id="score-opp">0</span>
        <span class="hud-team-label hud-opp" id="score-opp-name">OPP</span>
      </div>
      <!-- SSE connection status -->
      <div class="sse-bar">
        <span class="sse-dot connecting" id="sse-dot"></span>
        <span class="sse-label" id="sse-label">CONNECTING TO LIVE FEED...</span>
      </div>
    </div>

    <!-- ── Scoreboard body ── -->
    <div class="sb-body">

      <!-- Pre-game notice -->
      <div class="pre-game-notice hidden" id="pre-game-notice">
        <div class="notice-title">WAITING FOR KICKOFF</div>
        <p>The logger will start the game clock at kickoff.</p>
      </div>

      <!-- Full time notice -->
      <div class="ft-notice hidden" id="ft-notice">FULL TIME</div>

      <!-- Tallies -->
      <div class="tallies-panel" id="tallies-panel">
        <div class="tallies-title">EVENT TALLIES</div>
        <div id="tallies-rows"></div>
      </div>

      <!-- Recent events -->
      <div class="recent-panel">
        <div class="recent-panel-title">RECENT EVENTS</div>
        <div class="recent-panel-events" id="recent-events">
          <div class="sb-empty">No events yet.</div>
        </div>
      </div>

    </div>
  </div>

  <!-- Goal flash overlay -->
  <div id="goal-flash"></div>

  <script>
    'use strict';

    // ── Event definitions ─────────────────────────────────────────────────────

    const EVENT_TYPES = [
      { family: 'goal',      label: 'GOAL'      },
      { family: 'kickoff',   label: 'KICKOFF'   },
      { family: 'sideout',   label: 'SIDEOUT'   },
      { family: 'goal_kick', label: 'GOAL KICK' },
      { family: 'corner',    label: 'CORNER'    },
      { family: 'free_kick', label: 'FREE KICK' },
    ];

    const EVENT_DISPLAY = {
      goal_pfc:      'Goal — PFC',
      goal_opp:      'Goal — Opponent',
      kickoff_pfc:   'Kickoff — PFC',
      kickoff_opp:   'Kickoff — Opponent',
      sideout_pfc:   'Sideout — PFC',
      sideout_opp:   'Sideout — Opponent',
      goal_kick_pfc: 'Goal Kick — PFC',
      goal_kick_opp: 'Goal Kick — Opponent',
      corner_pfc:    'Corner — PFC',
      corner_opp:    'Corner — Opponent',
      free_kick_pfc: 'Free Kick — PFC',
      free_kick_opp: 'Free Kick — Opponent',
    };

    // ── State ─────────────────────────────────────────────────────────────────

    let gameId   = null;
    let token    = null;
    let game     = null;
    let events   = [];

    // Clock extrapolation
    let serverClock   = 0;      // clock_seconds from last server update
    let receivedAt    = null;   // when we received that update
    let clockInterval = null;

    // SSE
    let es            = null;   // EventSource
    let sseRetryCount = 0;
    let prevEventCount = 0;     // for detecting new goals

    // ── URL params ────────────────────────────────────────────────────────────

    (function parseParams() {
      const p = new URLSearchParams(location.search);
      gameId = p.get('gameId');
      token  = p.get('token');
    })();

    // ── Helpers ───────────────────────────────────────────────────────────────

    function el(id) { return document.getElementById(id); }

    function formatTime(s) {
      const t = Math.max(0, Math.floor(s));
      return `${String(Math.floor(t / 60)).padStart(2, '0')}:${String(t % 60).padStart(2, '0')}`;
    }

    function esc(str) {
      return String(str ?? '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    // ── Clock (smooth extrapolation) ──────────────────────────────────────────

    function startLocalClock() {
      if (clockInterval) clearInterval(clockInterval);
      clockInterval = setInterval(() => {
        if (!game || game.status !== 'live') return;
        if (receivedAt === null) return;
        const elapsed = Math.floor((Date.now() - receivedAt) / 1000);
        el('clock').textContent = formatTime(serverClock + elapsed);
      }, 500);
    }

    function updateClockFromServer(serverGame) {
      serverClock = serverGame.clock_seconds || 0;
      receivedAt  = Date.now();
      if (serverGame.status !== 'live') {
        el('clock').textContent = formatTime(serverClock);
      }
    }

    // ── SSE status ────────────────────────────────────────────────────────────

    function setSseStatus(status) {
      const dot   = el('sse-dot');
      const label = el('sse-label');
      dot.className   = `sse-dot ${status}`;
      label.className = `sse-label ${status}`;
      const labels = {
        connected:    'LIVE',
        disconnected: 'RECONNECTING...',
        connecting:   'CONNECTING...',
      };
      label.textContent = labels[status] || status.toUpperCase();
    }

    // ── Goal flash ────────────────────────────────────────────────────────────

    function goalCelebration() {
      const overlay = el('goal-flash');
      overlay.classList.add('show');
      setTimeout(() => overlay.classList.remove('show'), 500);

      // Pop the score digits
      ['score-pfc', 'score-opp'].forEach(id => {
        const s = el(id);
        s.classList.remove('score-pop');
        void s.offsetWidth; // force reflow
        s.classList.add('score-pop');
        s.addEventListener('animationend', () => s.classList.remove('score-pop'), { once: true });
      });
    }

    // ── Derive display values ─────────────────────────────────────────────────

    function deriveScore() {
      let pfc = 0, opp = 0;
      for (const e of events) {
        if (e.event_code === 'goal_pfc') pfc++;
        else if (e.event_code === 'goal_opp') opp++;
      }
      return { pfc, opp };
    }

    function deriveTallies() {
      const counts = {};
      for (const e of events) {
        counts[e.event_code] = (counts[e.event_code] || 0) + 1;
      }
      return counts;
    }

    // ── Build tallies rows (once) ─────────────────────────────────────────────

    function buildTalliesRows() {
      const container = el('tallies-rows');
      container.innerHTML = EVENT_TYPES.map(({ family, label }) => `
        <div class="tally-row ev-${family}" id="tally-row-${family}">
          <div class="tally-pfc" id="tally-pfc-${family}">0</div>
          <div class="tally-name">${label}</div>
          <div class="tally-opp" id="tally-opp-${family}">0</div>
        </div>
      `).join('');
    }

    // ── Render ────────────────────────────────────────────────────────────────

    function render() {
      if (!game) return;

      // Names
      const teamName = game.team_name || 'PFC';
      const opponent = game.opponent  || 'OPP';
      el('score-pfc-name').textContent = teamName;
      el('score-opp-name').textContent = opponent;
      el('header-opponent').textContent = 'vs ' + opponent;

      // Period
      el('half-indicator').textContent = game.current_period || 'PRE';

      // Score (from events)
      const { pfc, opp } = deriveScore();
      el('score-pfc').textContent = pfc;
      el('score-opp').textContent = opp;

      // Tallies
      const counts = deriveTallies();
      EVENT_TYPES.forEach(({ family }) => {
        const p = counts[`${family}_pfc`] || 0;
        const o = counts[`${family}_opp`] || 0;
        const pfcEl = el(`tally-pfc-${family}`);
        const oppEl = el(`tally-opp-${family}`);
        if (pfcEl) pfcEl.textContent = p;
        if (oppEl) oppEl.textContent = o;
      });

      // Update display labels with actual team/opponent names
      // (replace "PFC" and "Opponent" in event display)
      const pfcLabel = teamName;
      const oppLabel = opponent;

      // Recent events (last 8, newest first)
      const last8 = events.slice(-8).reverse();
      const recentEl = el('recent-events');
      if (!last8.length) {
        recentEl.innerHTML = '<div class="sb-empty">No events yet.</div>';
      } else {
        recentEl.innerHTML = last8.map(e => {
          const code   = e.event_code;
          const isGoal = code.startsWith('goal_');
          const isPfc  = code.endsWith('_pfc');
          const cls    = isGoal ? 'sb-re-goal' : isPfc ? 'sb-re-pfc' : 'sb-re-opp';
          let label    = EVENT_DISPLAY[code] || code;
          // Replace PFC/Opponent with actual names
          label = label.replace('PFC', esc(pfcLabel)).replace('Opponent', esc(oppLabel));
          return `
            <div class="sb-recent-event ${cls}">
              <span class="sb-re-period">${esc(e.period)}</span>
              <span class="sb-re-time">${formatTime(e.clock_seconds)}</span>
              <span class="sb-re-label">${label}</span>
            </div>`;
        }).join('');
      }

      // Status banners
      const isPre   = game.status === 'pending';
      const isFinal = game.status === 'final';

      el('pre-game-notice').classList.toggle('hidden', !isPre);
      el('ft-notice').classList.toggle('hidden', !isFinal);

      // Clock
      updateClockFromServer(game);
    }

    // ── Apply state update ────────────────────────────────────────────────────

    function applyUpdate(serverGame, serverEvents) {
      // Detect new goal events
      const newGoal = serverEvents.length > events.length &&
        serverEvents.slice(events.length).some(e => e.event_code.startsWith('goal_'));

      game   = serverGame;
      events = serverEvents;

      render();

      if (newGoal) goalCelebration();
      prevEventCount = events.length;
    }

    // ── SSE connection ────────────────────────────────────────────────────────

    function connectSSE() {
      if (es) {
        es.close();
        es = null;
      }

      setSseStatus('connecting');

      const url = `/api/games/${gameId}/stream?token=${token}`;
      es = new EventSource(url);

      es.onopen = () => {
        setSseStatus('connected');
        sseRetryCount = 0;
      };

      es.onmessage = (event) => {
        if (!event.data || event.data.trim() === '') return;
        try {
          const msg = JSON.parse(event.data);
          if (msg.type === 'state_update') {
            applyUpdate(msg.game, msg.events);
          }
        } catch (_) {}
      };

      es.onerror = () => {
        setSseStatus('disconnected');
        es.close();
        es = null;

        // Exponential backoff reconnect
        const delay = Math.min(3000 * Math.pow(1.5, sseRetryCount), 30_000);
        sseRetryCount++;
        setTimeout(() => {
          // Re-fetch state before reconnecting
          fetch(`/api/games/${gameId}?token=${token}`)
            .then(r => r.json())
            .then(data => {
              applyUpdate(data.game, data.events);
              connectSSE();
            })
            .catch(() => connectSSE());
        }, delay);
      };
    }

    // ── Initialisation ────────────────────────────────────────────────────────

    async function init() {
      if (!gameId || !token) {
        showError('INVALID LINK', 'Missing gameId or token in URL.');
        return;
      }

      buildTalliesRows();
      startLocalClock();

      try {
        const r = await fetch(`/api/games/${gameId}?token=${token}`);
        if (r.status === 403 || r.status === 404) {
          const err = await r.json().catch(() => ({}));
          showError('ACCESS DENIED', err.error || 'Invalid or expired link.');
          return;
        }
        if (!r.ok) throw new Error(`HTTP ${r.status}`);

        const data = await r.json();
        game   = data.game;
        events = data.events;
        render();

      } catch (err) {
        showError('LOAD ERROR', 'Could not load scoreboard. Please refresh.');
        return;
      }

      // Show scoreboard
      el('screen-loading').classList.add('hidden');
      el('screen-scoreboard').classList.remove('hidden');
      el('screen-scoreboard').style.display = 'flex';
      el('screen-scoreboard').classList.add('active');

      // Connect SSE for live updates
      connectSSE();
    }

    function showError(title, msg) {
      el('screen-loading').classList.add('hidden');
      el('error-title').textContent = title;
      el('error-msg').textContent   = msg;
      el('screen-error').classList.remove('hidden');
    }

    // ── Boot ──────────────────────────────────────────────────────────────────
    init();
  </script>
</body>
</html>
